<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase de xml Catálogo Retro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Consumiendo XML con Javascript</h1>
        <p>Aprende a transformar datos estructurados en una interfaz visual</p>
    </header>
        <main class="contenedor">
            <!-- sección del código fuente -->
            <section class="code-section">
                <h2>1. Datos en formato XML</h2>
                <pre id = "xml-display">
                    <!-- Aqui se mostrará el texto en xml -->
                </pre>
            </section>
            <!-- Sección de resultados -->
            <section class="display-section">
                <h2>2. Visualización en HTML</h2>
                <div id="visualization">
                    <!-- Aquí se mostrará la visualización del XML -->
                </div>
            </section>
                <!-- Botón de acción -->
                <div class="actions">
                    <button id="btn-procesar">Procesar XML y renderizar</button>
                </div>
                <!-- Sección visualización -->
                 <section class="display-section">
                    <h2>3. Resultado en la web</h2>
                    <div id="catalog" >
                        <!-- Aquí se mostrará el resultado final después de procesar el XML -->
                    </div>

                 </section>


        </main>
        <footer>
        <p>&copy; 2026 Taller de XML. Todos los derechos reservados.</p>
        </footer>
    <script src="script.js"></script>
</body>
</html>
